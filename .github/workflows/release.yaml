name: release

permissions: {}

on:
  push:
    tags:
      - v[0-9]+.[0-9]+.[0-9]+

concurrency:
  group: ci-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-tag:
    uses: gechr/actions/.github/workflows/verify-tag.yaml@b5afcb5e5cb47cf5b5ede19e98710e0c76c9e058 # v0.0.2

  publish:
    needs: verify-tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    environment: release
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        id: app-token
        with:
          app-id: ${{ vars.HOMEBREW_APP_ID }}
          private-key: ${{ secrets.HOMEBREW_APP_PRIVATE_KEY }}
          repositories: homebrew-tap

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false

      - uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          distribution: goreleaser
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - uses: gechr/homebrew-publish-formula@65dd55a61ec1be6c118e94cf20b5292916d6ce0d # v1.0.2
        with:
          name: prl
          desc: "Interact with GitHub pull requests"
          token: ${{ steps.app-token.outputs.token }}
          version: ${{ github.ref_name }}
          homepage: https://github.com/${{ github.repository }}
